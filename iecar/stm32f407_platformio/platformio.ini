[platformio]
default_envs = car1

description = 2021-F-drug_car STM32F407 PlatformIO workspace

[env]
build_flags =
  -DSTM32F40_41xxx
  -DUSE_STDPERIPH_DRIVER

[env:car1]
platform = platformio/ststm32@^19.0.0
framework = spl
board = black_f407zg_spl
upload_protocol = stlink
debug_tool = stlink
monitor_speed = 115200
build_src_filter =
  +<COMMON/CHE/*_shared.c>
  +<COMMON/ROLE_SHARED/USER/*.c>
  +<COMMON/ROLE_SHARED/SYSTEM/*.c>
  +<COMMON/ROLE_SHARED/SYSTEM/ANO_V7/*.c>
  +<COMMON/ROLE_SHARED/SYSTEM/delay/*.c>
  +<COMMON/ROLE_SHARED/SYSTEM/oled/*.c>
  +<COMMON/ROLE_SHARED/SYSTEM/pid/*.c>
  +<COMMON/ROLE_SHARED/SYSTEM/sys/*.c>
  +<COMMON/ROLE_SHARED/MOTOR_shuanghuan/*.c>
  +<car1/SYSTEM/*.c>
  +<car1/SYSTEM/CHE/task2.c>
  +<car1/SYSTEM/CHE/task3.c>
  +<COMMON/PLATFORM/syscalls_gcc.c>
lib_ldf_mode = chain+
build_flags =
  ${env.build_flags}
  -Isrc/COMMON/CHE
  -Isrc/COMMON/STRATEGY
  -Isrc/COMMON/PLATFORM
  -Isrc/COMMON/ROLE_SHARED/SYSTEM/STRATEGY/common
  -Isrc/COMMON/ROLE_SHARED/MOTOR_shuanghuan
  -Isrc/COMMON/ROLE_SHARED/SYSTEM/sys
  -Isrc/COMMON/ROLE_SHARED/SYSTEM/pid
  -Isrc/COMMON/ROLE_SHARED/SYSTEM/oled
  -Isrc/COMMON/ROLE_SHARED/SYSTEM/delay
  -Isrc/COMMON/ROLE_SHARED/SYSTEM/ANO_V7
  -Isrc/COMMON/ROLE_SHARED/SYSTEM/PLATFORM
  -Isrc/COMMON/ROLE_SHARED/SYSTEM
  -Isrc/COMMON/ROLE_SHARED/USER
  -Isrc/car1/SYSTEM
  -Isrc/car1/SYSTEM/CHE
  -Isrc/car1/SYSTEM/PLATFORM
  -Isrc/car1/SYSTEM/STRATEGY/common
  -Isrc/car1/SYSTEM/STRATEGY/car1

[env:car2]
platform = platformio/ststm32@^19.0.0
framework = spl
board = black_f407zg_spl
upload_protocol = stlink
debug_tool = stlink
monitor_speed = 115200
build_src_filter =
  +<COMMON/CHE/*_shared.c>
  +<COMMON/ROLE_SHARED/USER/*.c>
  +<COMMON/ROLE_SHARED/SYSTEM/*.c>
  +<COMMON/ROLE_SHARED/SYSTEM/ANO_V7/*.c>
  +<COMMON/ROLE_SHARED/SYSTEM/delay/*.c>
  +<COMMON/ROLE_SHARED/SYSTEM/oled/*.c>
  +<COMMON/ROLE_SHARED/SYSTEM/pid/*.c>
  +<COMMON/ROLE_SHARED/SYSTEM/sys/*.c>
  +<COMMON/ROLE_SHARED/MOTOR_shuanghuan/*.c>
  +<car2/SYSTEM/*.c>
  +<car2/SYSTEM/CHE/task2.c>
  +<car2/SYSTEM/CHE/task3.c>
  +<COMMON/PLATFORM/syscalls_gcc.c>
lib_ldf_mode = chain+
build_flags =
  ${env.build_flags}
  -Isrc/COMMON/CHE
  -Isrc/COMMON/STRATEGY
  -Isrc/COMMON/PLATFORM
  -Isrc/COMMON/ROLE_SHARED/SYSTEM/STRATEGY/common
  -Isrc/COMMON/ROLE_SHARED/MOTOR_shuanghuan
  -Isrc/COMMON/ROLE_SHARED/SYSTEM/sys
  -Isrc/COMMON/ROLE_SHARED/SYSTEM/pid
  -Isrc/COMMON/ROLE_SHARED/SYSTEM/oled
  -Isrc/COMMON/ROLE_SHARED/SYSTEM/delay
  -Isrc/COMMON/ROLE_SHARED/SYSTEM/ANO_V7
  -Isrc/COMMON/ROLE_SHARED/SYSTEM/PLATFORM
  -Isrc/COMMON/ROLE_SHARED/SYSTEM
  -Isrc/COMMON/ROLE_SHARED/USER
  -Isrc/car2/SYSTEM
  -Isrc/car2/SYSTEM/CHE
  -Isrc/car2/SYSTEM/PLATFORM
  -Isrc/car2/SYSTEM/STRATEGY/common
  -Isrc/car2/SYSTEM/STRATEGY/car2


[env:native]
platform = native
test_build_src = no
build_flags =
  -Iinclude
  -Itest/host
  -Isrc/COMMON/CHE
  -Isrc/COMMON/STRATEGY
  -Isrc/COMMON/PLATFORM
  -Isrc/COMMON/ROLE_SHARED/SYSTEM/STRATEGY/common
  -Isrc/COMMON/ROLE_SHARED/MOTOR_shuanghuan
  -Isrc/COMMON/ROLE_SHARED/SYSTEM/sys
  -Isrc/COMMON/ROLE_SHARED/SYSTEM/pid
  -Isrc/COMMON/ROLE_SHARED/SYSTEM/oled
  -Isrc/COMMON/ROLE_SHARED/SYSTEM/delay
  -Isrc/COMMON/ROLE_SHARED/SYSTEM/ANO_V7
  -Isrc/COMMON/ROLE_SHARED/SYSTEM/PLATFORM
  -Isrc/COMMON/ROLE_SHARED/SYSTEM
  -Isrc/COMMON/ROLE_SHARED/USER
